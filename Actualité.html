<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="Icone.png">
    <title>Actualité</title>
    <link rel="stylesheet" href="style.css?v=2">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        #issues { display: flex; flex-direction: column; gap: 20px; }
        .post { 
            background: #ffffff; 
            padding: 25px; 
            border-left: 8px solid var(--primary); 
            border-radius: 12px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            animation: fadeIn 0.5s ease; 
        }
        .post h3 { margin: 10px 0; color: var(--primary); font-size: 1.4rem; }
        .post img { max-width: 100%; height: auto; border-radius: 8px; margin: 15px 0; }
        .skeleton { 
            height: 120px; 
            background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%); 
            background-size: 200% 100%; 
            animation: loading 1.5s infinite; 
            border-radius: 12px; 
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes loading { from { background-position: 200% 0; } to { background-position: -200% 0; } }
    </style>
</head>
<body>

<nav class="nav-pc">
    <a href="index.html">Accueil</a>
    <a href="Actualité.html" class="active" style="position:relative;">Actualité <span id="badge-pc" class="badge" style="display:none; background:#ff5252; color:white; font-size:10px; padding:2px 6px; border-radius:10px; position:absolute; top:-10px; right:-15px;">NOUVEAU</span></a>
    <a href="Les objectifs.html">Les objectifs</a>
</nav>

<header class="header">
    <h1>Actualité</h1>
    <p>Le journal de bord de nos engagements écologiques</p>
</header>

<main class="container">
    <section class="card">
        <h2>Espace Modification</h2>
        <p style="font-size: 0.9rem; color: #666;">Réservé aux membres des éco-déléguée de H.R. pour publier.</p>
        <button class="btn" id="btn-admin" onclick="ouvrirMdp()" style="margin-top: 10px;">Publier un article</button>
        
        <div id="zone-mdp" style="display:none; margin-top:15px; gap: 10px; flex-wrap: wrap;">
            <input type="password" id="mdp" placeholder="Code d'accès" style="padding:10px; border-radius:8px; border:1px solid #ddd;">
            <button class="btn" onclick="verifier()">Accéder</button>
        </div>
        
        <div id="zone-publi" style="display:none; margin-top:20px;">
            <a class="btn" href="https://github.com/valou2908/EcoApp/issues" target="_blank">Gérer les articles sur GitHub</a>
        </div>
    </section>

    <section>
        <h2 style="padding-left: 10px; margin-top: 30px;">Dernières nouvelles</h2>
        <div id="issues">
            <div class="skeleton"></div>
            <div class="skeleton" style="margin-top:20px;"></div>
        </div>
    </section>
</main>

<nav class="nav-mobile">
    <a href="index.html" style="text-decoration:none; color:#777; text-align:center; font-size:0.8rem;">🏠<br>Accueil</a>
    <a href="Actualité.html" style="text-decoration:none; color:var(--primary); font-weight:bold; text-align:center; font-size:0.8rem;">💬<br>Actualité <span class="badge" style="display:none; background:#ff5252; color:white; font-size:10px; padding:2px 6px; border-radius:10px; margin-left:3px; vertical-align:super;">!</span></a>
    <a href="Les objectifs.html" style="text-decoration:none; color:#777; text-align:center; font-size:0.8rem;">🏆<br>Les objectifs</a>
</nav>

<script>
const SECRET = "RWNvMjAyNS8yNg=="; 
marked.setOptions({ breaks: true, gfm: true });

// 1. Demande de permission et enregistrement SW
if ("Notification" in window) {
    if (Notification.permission !== "granted" && Notification.permission !== "denied") {
        Notification.requestPermission();
    }
}

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}

// 2. Fonctions interface
function ouvrirMdp() {
    document.getElementById("zone-mdp").style.display = "flex";
    document.getElementById("btn-admin").style.display = "none";
}

function verifier() {
    const input = document.getElementById("mdp").value;
    if (btoa(input) === SECRET) {
        document.getElementById("zone-publi").style.display = "block";
        document.getElementById("zone-mdp").style.display = "none";
    } else { alert("Code incorrect"); }
}

// 3. Logique de chargement automatique
async function chargerIssues() {
    const zone = document.getElementById("issues");
    try {
        const res = await fetch("https://api.github.com/repos/valou2908/EcoApp/issues?per_page=10");
        const issues = await res.json();
        
        if (!Array.isArray(issues)) throw new Error("Erreur API");

        // Détection de nouveauté pour notification
        const ancienNb = parseInt(localStorage.getItem('nb_issues_eco')) || 0;
        
        if (issues.length > ancienNb && Notification.permission === "granted") {
            const derniere = issues[0];
            navigator.serviceWorker.ready.then(reg => {
                reg.showNotification("Nouvel article !", {
                    body: derniere.title,
                    icon: "Icone.png",
                    data: { url: "Actualité.html" }
                });
            });
        }
        
        // Mise à jour de l'affichage
        zone.innerHTML = "";
        if (issues.length === 0) {
            zone.innerHTML = "<p>Aucune actualité pour le moment.</p>";
            return;
        }

        issues.forEach(issue => {
            const date = new Date(issue.created_at).toLocaleDateString('fr-FR', {day: 'numeric', month: 'long'});
            const post = document.createElement('article');
            post.className = 'post';
            post.innerHTML = `
                <small style="color:var(--primary); font-weight:bold;">${date}</small>
                <h3>${issue.title}</h3>
                <div class="content">${marked.parse(issue.body || "Pas de contenu.")}</div>
            `;
            zone.appendChild(post);
        });

        localStorage.setItem('nb_issues_eco', issues.length);
        document.querySelectorAll('.badge').forEach(b => b.style.display = 'none');

    } catch (e) { 
        zone.innerHTML = "<p>Erreur de connexion.</p>";
    }
}

// --- AUTOMATISATION SANS ACTUALISER ---

// Vérifie dès qu'on revient sur l'onglet
document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
        chargerIssues();
    }
});

// Vérifie toutes les 5 minutes (en arrière-plan)
setInterval(chargerIssues, 300000);

// Premier chargement
chargerIssues();
</script>
</body>
</html>
