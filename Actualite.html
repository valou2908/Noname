<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="Icone.png">
    <title>Actualité</title>
    <link rel="stylesheet" href="style.css?v=2">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        /* On garde ici seulement ce qui est UNIQUE à la page Actu */
        #issues { display: flex; flex-direction: column; gap: 20px; }
        .post { 
            background: #ffffff; 
            padding: 25px; 
            border-left: 8px solid var(--primary); 
            border-radius: 12px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            animation: fadeIn 0.5s ease; 
        }
        .post h3 { margin: 10px 0; color: var(--primary); font-size: 1.4rem; }
        .post img { max-width: 100%; height: auto; border-radius: 8px; margin: 15px 0; }
        
        .badge { 
            display: none; background: #ff5252; color: white; font-size: 10px; 
            padding: 2px 6px; border-radius: 10px; position: absolute; top: -10px; right: -15px; 
        }
        
        .skeleton { 
            height: 120px; 
            background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%); 
            background-size: 200% 100%; 
            animation: loading 1.5s infinite; 
            border-radius: 12px; 
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes loading { from { background-position: 200% 0; } to { background-position: -200% 0; } }
    </style>
</head>
<body>

<nav class="nav-pc">
    <a href="index.html">Accueil</a>
    <a href="Actualité.html" class="active">Actualité <span id="badge-pc" class="badge">NOUVEAU</span></a>
</nav>

<header class="header">
    <h1>Actualité</h1>
    <p>Le journal de bord de nos engagements écologiques</p>
</header>

<main class="container">
    <section class="card">
        <h2>Espace Modification</h2>
        <p style="font-size: 0.9rem; color: #666;">Réservé aux membres des éco-déléguée de H.R. pour publier.</p>
        <br><button class="btn" id="btn-admin" onclick="ouvrirMdp()">Publier un article</button>
        
        <div id="zone-mdp" style="display:none; margin-top:15px; gap: 10px; flex-wrap: wrap;">
            <input type="password" id="mdp" placeholder="Code d'accès" style="padding:10px; border-radius:8px; border:1px solid #ddd;">
            <button class="btn" onclick="verifier()">Accéder</button>
        </div>
        
        <div id="zone-publi" style="display:none; margin-top:20px;">
            <a class="btn" href="https://github.com/valou2908/EcoApp/issues" target="_blank">Modifier le Mots de Passe</a>
        </div>
    </section>

    <section>
        <h2 style="padding-left: 10px;">Dernières nouvelles</h2>
        <div id="issues">
            <div class="skeleton"></div>
            <div class="skeleton" style="margin-top:20px;"></div>
        </div>
    </section>
</main>

<nav class="nav-mobile">
    <a href="index.html" style="text-decoration:none; color:#777; text-align:center; font-size:0.8rem;">🏠<br>Accueil</a>
    <a href="Actualité.html" style="text-decoration:none; color:var(--primary); font-weight:bold; text-align:center; font-size:0.8rem; position:relative;">
        💬<br>Actualité <span id="badge-mobile" class="badge">!</span>
    </a>
</nav>

<script>
const SECRET = "RWNvMjAyNS8yNg=="; 
marked.setOptions({ breaks: true, gfm: true });

// --- Logique Admin ---
function ouvrirMdp() {
    document.getElementById("zone-mdp").style.display = "flex";
    document.getElementById("btn-admin").style.display = "none";
}

function verifier() {
    const input = document.getElementById("mdp").value;
    if (btoa(input) === SECRET) {
        document.getElementById("zone-publi").style.display = "block";
        document.getElementById("zone-mdp").style.display = "none";
    } else { alert("Code incorrect"); }
}

// --- Chargement GitHub ---
async function chargerIssues() {
    const zone = document.getElementById("issues");
    try {
        const res = await fetch("https://api.github.com/repos/valou2908/EcoApp/issues?per_page=10");
        const issues = await res.json();
        
        if (!Array.isArray(issues)) throw new Error("Erreur API");
        
        const dernierNb = localStorage.getItem('nb_issues_eco');
        if (dernierNb !== null && issues.length > parseInt(dernierNb)) {
            document.querySelectorAll('.badge').forEach(b => b.style.display = 'inline');
        }
        localStorage.setItem('nb_issues_eco', issues.length);

        zone.innerHTML = "";
        if (issues.length === 0) {
            zone.innerHTML = "<p>Aucune actualité pour le moment.</p>";
            return;
        }

        issues.forEach(issue => {
            const date = new Date(issue.created_at).toLocaleDateString('fr-FR', {day: 'numeric', month: 'long'});
            const post = document.createElement('article');
            post.className = 'post';
            post.innerHTML = `
                <small style="color:var(--primary); font-weight:bold;">${date}</small>
                <h3>${issue.title}</h3>
                <div class="content">${marked.parse(issue.body || "Pas de contenu.")}</div>
                <div style="margin-top:15px; padding-top:15px; border-top:1px solid #eee; font-size:0.85rem; color:#666;">
                    Posté par <strong>${issue.user.login}</strong>
                </div>
            `;
            zone.appendChild(post);
        });
    } catch (e) { 
        zone.innerHTML = "<p>Erreur lors du chargement.</p>";
    }
}

// Lancement
chargerIssues();
setInterval(chargerIssues, 300000);
</script>
</body>
</html>
