<!DOCTYPE html> 
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="icone.png">
    <link rel="manifest" href="manifest.json">
    <title>Actualité</title>
    <link rel="stylesheet" href="style.css?v=2">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        #issues { display: flex; flex-direction: column; gap: 20px; }
        .post { background: #fff; padding: 25px; border-left: 8px solid var(--primary); border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .post h3 { margin: 10px 0; color: var(--primary); }
        #notif-banner { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: #333; color: white; padding: 15px; border-radius: 12px; z-index: 1000; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn-notif { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header class="header">
    <h1>Actualité</h1>
    <p>Le journal de bord écologique</p>
</header>

<main class="container">
    <div id="issues"><p>Chargement...</p></div>
</main>

<nav class="nav-mobile">
    <a href="index.html">🏠<br>Accueil</a>
    <a href="actualite.html" class="active">💬<br>Actualité</a>
</nav>

<script>
const SECRET = "RWNvMjAyNS8yNg==";
let deferredPrompt;

// 1. Capture de l'installation
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    console.log("Install pret");
});

// 2. Bouton "Tout accepter" (Notif + Install)
async function accepterTout() {
    const permission = await Notification.requestPermission();
    
    if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
    }

    if (permission === "granted") {
        const reg = await navigator.serviceWorker.ready;
        reg.showNotification("Eco-Délégués H.R.", {
            body: "Notifications activées !",
            icon: "icone.png"
        });
    }
    const b = document.getElementById("notif-banner");
    if(b) b.remove();
}

// 3. Fonctions de base
async function chargerIssues() {
    try {
        const res = await fetch("https://api.github.com/repos/valou2908/EcoApp/issues?per_page=10");
        const issues = await res.json();
        const zone = document.getElementById("issues");
        zone.innerHTML = "";
        issues.forEach(issue => {
            const post = document.createElement('article');
            post.className = 'post';
            post.innerHTML = `<h3>${issue.title}</h3><div>${marked.parse(issue.body || "")}</div>`;
            zone.appendChild(post);
        });
    } catch (e) { console.error(e); }
}

window.onload = () => {
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
    chargerIssues();
    
    // Affiche le bandeau si besoin
    setTimeout(() => {
        if (Notification.permission === "default") {
            const banner = document.createElement('div');
            banner.id = "notif-banner";
            banner.innerHTML = `<span>Installer l'app ?</span><button class="btn-notif" onclick="accepterTout()">Installer</button>`;
            document.body.appendChild(banner);
        }
    }, 2000);
};
</script>
</body>
</html>
